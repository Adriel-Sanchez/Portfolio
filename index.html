<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adriel Sanchez | Cybersecurity Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #3a8eff;
            --text-muted: #bbb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #f1f1f1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* NAVIGATION */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #0e0e0e;
            padding: 14px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
            z-index: 10;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            color: var(--text-muted);
            font-weight: 600;
            position: relative;
            transition: color 0.3s ease;
        }

        nav a::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 2px;
            bottom: -4px;
            left: 0;
            background: var(--accent-color);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        nav a:hover::before,
        nav a.active::before {
            transform: scaleX(1);
        }

        nav a:hover {
            color: var(--accent-color);
        }

        nav a.active {
            color: var(--accent-color);
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 160px 20px 80px;
        }

        header h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            color: var(--accent-color);
            font-weight: 700;
        }

        header p {
            font-size: clamp(1rem, 2vw, 1.4rem);
            margin-top: 16px;
            color: var(--text-muted);
            font-family: 'Poppins', sans-serif;
        }

        /* ARROW */
        .arrow-wrapper {
            position: absolute;
            top: -140px;
            left: calc(50% - 110px);
            text-align: center;
        }

        .arrow-wrapper p {
            margin-bottom: 6px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            transform: rotate(-4deg);
        }

        .arrow-wrapper svg {
            width: 100px;
            height: 100px;
            fill: none;
            stroke: #fff;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* FOOTER */
        footer {
            position: relative; /* Needed so arrow positions relative to footer */
            text-align: center;
            padding: 20px;
            background: #0e0e0e;
            color: #999;
            margin-top: auto;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 12px;
        }

        .social-icons a {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .social-icons img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        .social-icons a:hover {
            background: var(--accent-color);
            transform: scale(1.1);
        }

        .footer-text {
            font-size: 0.9rem;
            color: #aaa;
            font-style: italic;
        }
    </style>
</head>

<body>

    <!-- NAVIGATION -->
    <nav>
        <ul>
            <li><a href="/Portfolio/index.html" class="active">Portfolio</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="credentials.html">Credentials</a></li>
        </ul>
    </nav>

    <!-- HEADER -->
    <header>
        <h1>Adriel Sanchez</h1>
        <p>Cybersecurity | Analytics | Network Hardening</p>
    </header>

    <!-- FOOTER -->
    <footer>

        <!-- ARROW ABOVE LINKEDIN -->
        <div class="arrow-wrapper">
            <p>I'm also on LinkedIn!</p>
            <svg viewBox="0 0 100 100">
                <path d="M50,10 C50,40 50,70 50,85" />
                <line x1="50" y1="85" x2="45" y2="75" />
                <line x1="50" y1="85" x2="55" y2="75" />
            </svg>
        </div>

        <div class="social-icons">
            <a href="https://www.linkedin.com/in/adrielsanchez" target="_blank">
                <img src="https://adriel-sanchez.github.io/Portfolio/Images/Linkedin.png" alt="LinkedIn" />
            </a>
            <a href="https://www.credly.com/users/adriel-sanchez.6d9c4577" target="_blank">
                <img src="https://adriel-sanchez.github.io/Portfolio/Images/Credly.png" alt="Credly" />
            </a>
        </div>

        <div class="footer-text">
            <p>Created by Adriel Sanchez ✨</p>
        </div>
    </footer>

</body>
</html>
