<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Adriel Sanchez — Cybersecurity professional specializing in analytics, network hardening, and information security." />
    <title>Adriel Sanchez | Cybersecurity Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #4f6ef7;
            --text-muted: #bbb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #f1f1f1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .page-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            gap: 80px;
        }

        .side-nav {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex-shrink: 0;
        }

        .side-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 12px;
            border: 1px solid rgba(79, 110, 247, 0.25);
            background: rgba(79, 110, 247, 0.06);
            color: #f1f1f1;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.02em;
            transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
            position: relative;
            overflow: hidden;
            min-width: 160px;
        }

        .side-nav a::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(79,110,247,0.15), transparent);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .side-nav a:hover::before {
            opacity: 1;
        }

        .side-nav a:hover {
            border-color: var(--accent-color);
            background: rgba(79, 110, 247, 0.12);
            transform: translateX(6px);
            box-shadow: 0 4px 24px rgba(79, 110, 247, 0.2);
            color: #fff;
        }

        .side-nav a .nav-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .side-nav a .nav-label {
            flex: 1;
        }

        .side-nav a .nav-arrow {
            opacity: 0;
            transform: translateX(-4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            color: var(--accent-color);
            font-size: 1rem;
        }

        .side-nav a:hover .nav-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .side-divider {
            width: 1px;
            align-self: stretch;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.08) 20%, rgba(255,255,255,0.08) 80%, transparent);
            flex-shrink: 0;
        }

        .hero {
            flex: 1;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            color: #f1f1f1;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .hero h1 span {
            color: var(--accent-color);
        }

        .hero p {
            font-size: clamp(1rem, 1.8vw, 1.15rem);
            color: var(--text-muted);
            font-family: 'Poppins', sans-serif;
            line-height: 1.7;
            max-width: 480px;
            margin: 0 auto;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #0e0e0e;
            color: #999;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 12px;
        }

        .social-icons a {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .social-icons img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        .social-icons a:hover {
            background: var(--accent-color);
            transform: scale(1.1);
        }

        .footer-text {
            font-size: 0.9rem;
            color: #aaa;
            font-style: italic;
        }

        @media (max-width: 700px) {
            .page-body {
                flex-direction: column;
                align-items: center;
                padding: 40px 24px;
                gap: 40px;
            }
            .side-divider { display: none; }
            .side-nav a { min-width: unset; width: 100%; }
        }
    </style>
</head>

<body>

    <div class="page-body">

        <nav class="side-nav" aria-label="Site navigation">
            <a href="projects.html">
                <span class="nav-icon">🛠</span>
                <span class="nav-label">Projects</span>
                <span class="nav-arrow">→</span>
            </a>
            <a href="credentials.html">
                <span class="nav-icon">🎓</span>
                <span class="nav-label">Credentials</span>
                <span class="nav-arrow">→</span>
            </a>
        </nav>

        <div class="side-divider"></div>

        <div class="hero">
            <h1>Adriel<br><span>Sanchez</span></h1>
            <p>Cybersecurity professional focused on analytics, network hardening, and information security.</p>
        </div>

    </div>

    <footer>
        <div class="social-icons">
            <a href="https://www.linkedin.com/in/adrielsanchez" target="_blank" rel="noopener">
                <img src="https://adriel-sanchez.github.io/Portfolio/Images/Linkedin.png" alt="LinkedIn" />
            </a>
        </div>
        <div class="footer-text">
            <p>Made with love by Adriel Sanchez ❤️</p>
        </div>
    </footer>

</body>
</html>
