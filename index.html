<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Adriel Sanchez — Cybersecurity professional specializing in analytics, network hardening, and information security." />
  <title>Adriel Sanchez | Cybersecurity Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent:     #4f6ef7;
      --accent-dim: rgba(79,110,247,0.15);
      --accent-glow:rgba(79,110,247,0.28);
      --bg:         #080810;
      --surface:    #10101a;
      --border:     rgba(255,255,255,0.07);
      --text:       #f0f0f8;
      --muted:      #7a7a9a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ambient glow */
    body::after {
      content: "";
      position: fixed;
      top: -20%; left: 50%; transform: translateX(-50%);
      width: 700px; height: 400px;
      background: radial-gradient(ellipse at center, rgba(79,110,247,0.11) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── LAYOUT ── */
    .page-body {
      flex: 1;
      display: grid;
      grid-template-columns: 220px 1fr 240px;
      align-items: center;
      padding: 0 48px;
      position: relative; z-index: 1;
      min-height: 100vh;
    }

    /* ── LEFT ── */
    .left-col { display: flex; flex-direction: column; gap: 10px; }
    .left-col a {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; padding: 13px 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text); font-weight: 600; font-size: 0.95rem;
      transition: background 0.25s, border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      position: relative; overflow: hidden;
    }
    .left-col a::before {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(79,110,247,0.12), transparent);
      opacity: 0; transition: opacity 0.25s;
    }
    .left-col a:hover::before { opacity: 1; }
    .left-col a:hover {
      border-color: rgba(79,110,247,0.5);
      background: var(--accent-dim);
      transform: translateX(5px);
      box-shadow: 0 4px 20px rgba(79,110,247,0.15);
      color: #fff;
    }
    .nav-icon  { font-size: 1.1rem; flex-shrink: 0; }
    .nav-label { flex: 1; }
    .nav-arrow {
      opacity: 0; transform: translateX(-4px);
      transition: opacity 0.2s, transform 0.2s;
      color: var(--accent);
    }
    .left-col a:hover .nav-arrow { opacity: 1; transform: translateX(0); }

    /* ── HERO ── */
    .hero { text-align: center; padding: 0 32px; }

    .hero h1 {
      font-family: 'Inter', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700; line-height: 1.1;
      letter-spacing: 0;
      color: var(--text);
      margin-bottom: 20px;
    }
    .hero h1 span {
      color: var(--accent);
    }

    .hero-role {
      font-size: 1rem; color: var(--muted);
      min-height: 1.6em;
      margin-bottom: 28px;
    }
    .hero-role span { color: var(--text); }
    #typed-cursor { animation: blink 1s infinite; color: var(--accent); }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

    /* ── PROFILE ── */
    .profile-col {
      display: flex; flex-direction: column;
      align-items: center; gap: 18px;
    }

    .btn-connect {
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
      text-decoration: none; padding: 11px 22px;
      border-radius: 10px;
      background: var(--accent); color: #fff;
      font-weight: 600; font-size: 0.9rem;
      letter-spacing: 0.02em;
      width: clamp(160px, 14vw, 220px);
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
    }
    .btn-connect:hover {
      background: #3a58e0;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(79,110,247,0.4);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 20px;
      background: rgba(8,8,16,0.9);
      border-top: 1px solid var(--border);
      position: relative; z-index: 1;
    }
    .social-icons {
      display: flex; justify-content: center;
      gap: 16px; margin-bottom: 10px;
    }
    .social-icons a {
      display: flex; justify-content: center; align-items: center;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      transition: background 0.3s, transform 0.3s;
    }
    .social-icons img { width: 60%; height: 60%; object-fit: contain; }
    .social-icons a:hover { background: var(--accent); transform: scale(1.1); }
    .footer-text { font-size: 0.82rem; color: #555; font-style: italic; }

    /* ── MOBILE ── */
    @media (max-width: 780px) {
      .page-body {
        grid-template-columns: 1fr;
        justify-items: center;
        padding: 40px 20px;
        gap: 36px;
        min-height: unset;
      }
      .hero { order: -1; padding: 0; }
      .left-col { width: 100%; max-width: 320px; }
      .left-col a { justify-content: flex-start; }
      .nav-arrow { display: none; }
      .profile-col { display: none; }
    }
  </style>
</head>
<body>


  <div class="page-body">

    <!-- LEFT -->
    <div class="left-col">
      <a href="projects.html">
        <span class="nav-icon">🛠</span>
        <span class="nav-label">Projects</span>
        <span class="nav-arrow">→</span>
      </a>
      <a href="credentials.html">
        <span class="nav-icon">🎓</span>
        <span class="nav-label">Credentials</span>
        <span class="nav-arrow">→</span>
      </a>
      <a href="https://adriel-sanchez.github.io/Portfolio/Files/Resume-AS.pdf" download>
        <span class="nav-icon">📄</span>
        <span class="nav-label">Resume</span>
        <span class="nav-arrow">↓</span>
      </a>
      <a href="https://adriel-sanchez.github.io/Portfolio/Files/MasterResume-AS.pdf" download>
        <span class="nav-icon">📋</span>
        <span class="nav-label">Master Resume</span>
        <span class="nav-arrow">↓</span>
      </a>
    </div>

    <!-- HERO -->
    <div class="hero">
      <h1>Adriel<br><span>Sanchez</span></h1>
      <div class="hero-role">
        <span id="typed-text"></span><span id="typed-cursor">|</span>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="profile-col">
      <a
        href="https://www.linkedin.com/in/adrielsanchez"
        target="_blank"
        rel="noopener"
        class="btn-connect"
      >
        🔗 Connect with me
      </a>
    </div>

  </div>

  <footer>
    <div class="social-icons">
      <a href="https://www.linkedin.com/in/adrielsanchez" target="_blank" rel="noopener">
        <img src="https://adriel-sanchez.github.io/Portfolio/Images/Linkedin.png" alt="LinkedIn" />
      </a>
      <a href="https://www.credly.com/users/adriel-sanchez.6d9c4577" target="_blank" rel="noopener">
        <img src="https://adriel-sanchez.github.io/Portfolio/Images/Credly.png" alt="Credly" />
      </a>
    </div>
    <div class="footer-text"><p>Made with love by Adriel Sanchez ❤️</p></div>
  </footer>

  <script>
    const roles = [
      "CompTIA Security+",
      "CompTIA Linux+",
      "CompTIA Network+",
      "Google Cybersecurity Professional",
      "NVIDIA AI Infrastructure & Operations",
      "DevOps and AI on AWS",
      "AS, Cyber & Information Security Technology",
      "BS, Information and Cybersecurity Operations",
    ];
    let ri = 0, ci = 0, deleting = false;
    function type() {
      const word = roles[ri];
      const el = document.getElementById('typed-text');
      if (!deleting) {
        el.textContent = word.slice(0, ci + 1);
        ci++;
        if (ci === word.length) { deleting = true; setTimeout(type, 1800); return; }
      } else {
        el.textContent = word.slice(0, ci - 1);
        ci--;
        if (ci === 0) { deleting = false; ri = (ri + 1) % roles.length; }
      }
      setTimeout(type, deleting ? 60 : 90);
    }
    type();
  </script>

</body>
</html>
