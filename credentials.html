<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adriel Sanchez | Credentials</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent-color: #3a8eff;
      --text-muted: #bbb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f1f1f1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* NAVIGATION */
    nav {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      background: #0e0e0e;
      padding: 14px 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      z-index: 10;
    }
    nav ul {
      display: flex;
      list-style: none;
      gap: 30px;
    }
    nav a {
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      color: var(--text-muted);
      font-weight: 600;
      position: relative;
      transition: color 0.3s ease;
    }
    nav a::before {
      content: "";
      position: absolute;
      width: 100%; height: 2px;
      bottom: -4px; left: 0;
      background: var(--accent-color);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    nav a:hover::before,
    nav a.active::before { transform: scaleX(1); }
    nav a:hover { color: var(--accent-color); }
    nav a.active { color: var(--accent-color); }

    /* HEADER */
    header {
      text-align: center;
      padding: 70px 20px 20px; /* reduced top padding so header is right under nav */
    }
    header h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--accent-color);
      font-weight: 700;
      font-family: 'Inter', sans-serif;
    }
    header p {
      font-size: clamp(0.9rem, 1.5vw, 1.2rem);
      margin-top: 10px;
      color: var(--text-muted);
      font-family: 'Poppins', sans-serif;
    }

    /* CONTENT SECTIONS */
    .container {
      display: flex;
      justify-content: space-between;
      max-width: 1000px;
      margin: 20px auto;
      padding: 20px;
      gap: 40px;
    }
    .column {
      flex: 1;
      text-align: center;
    }
    h2 {
      color: var(--accent-color);
      margin-bottom: 20px;
      font-family: 'Inter', sans-serif;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
      display: inline-block;
    }
    .card {
      background: #121212;
      padding: 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-family: 'Inter', sans-serif;
      color: var(--text-muted);
      font-weight: 600;
      transition: transform 0.2s ease, background 0.3s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      background: #1a1a1a;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      background: #0e0e0e;
      color: #999;
      margin-top: auto;
    }
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 12px;
    }
    .social-icons a {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      transition: background 0.3s ease, transform 0.3s ease;
    }
    .social-icons img {
      width: 70%; height: 70%;
      object-fit: contain;
    }
    .social-icons a:hover {
      background: var(--accent-color);
      transform: scale(1.1);
    }
    .footer-text {
      font-size: 0.9rem;
      color: #aaa;
      font-style: italic;
    }
  </style>
</head>
<body>
  <!-- NAVIGATION -->
  <nav>
    <ul>
      <li><a href="/Portfolio/index.html">Portfolio</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="credentials.html" class="active">Credentials</a></li>
    </ul>
  </nav>

  <!-- HEADER -->
  <header>
    <h1>Credentials</h1>
    <p>Education & Certifications</p>
  </header>

  <!-- CONTENT -->
  <div class="container">
    <!-- Degrees Column -->
    <div class="column">
      <h2>College Degrees</h2>
      <div class="card">Diploma in Cybersecurity</div>
      <div class="card">Bachelor’s in Computer Science</div>
    </div>

    <!-- Certificates Column -->
    <div class="column">
      <h2>Certificates</h2>
      <div class="card">CompTIA Security+</div>
      <div class="card">CompTIA Network+</div>
      <div class="card">Google Cybersecurity Certificate</div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="social-icons">
      <a href="https://www.linkedin.com/in/adrielsanchez" target="_blank">
        <img src="https://adriel-sanchez.github.io/Portfolio/Images/Linkedin.png" alt="LinkedIn" />
      </a>
      <a href="https://www.credly.com/users/adriel-sanchez.6d9c4577" target="_blank">
        <img src="https://adriel-sanchez.github.io/Portfolio/Images/Credly.png" alt="Credly" />
      </a>
    </div>
    <div class="footer-text">
      <p>Created by Adriel Sanchez ✨</p>
    </div>
  </footer>
</body>
</html>
